<text x="54" y="1188" class="ui" font-size="20">A warm, scholarly palette that balances trust, clarity, and timelessness.</text>
<text x="553" y="867" class="label" font-size="24">TYPOGRAPHY</text>
<text x="553" y="975" class="wm" font-size="88">Aa</text><text x="745" y="943" class="ui" font-weight="700" font-size="25">Merriweather Semibold</text><text x="745" y="978" class="ui" font-size="18">For headlines &amp; wordmark</text>
<path d="M553 1018 H960" stroke="#D6BE8A" stroke-width="2"/><text x="553" y="1112" font-family="Inter,sans-serif" font-size="86" fill="#0E6F6D">Aa</text><text x="745" y="1084" class="ui" font-weight="700" font-size="25">Inter Regular</text><text x="745" y="1118" class="ui" font-size="18">For UI and body copy</text>
