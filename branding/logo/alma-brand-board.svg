<text x="1224" y="548" class="label" font-size="30">CONCEPT NOTE</text>
<text x="1224" y="660" class="ui" font-size="26"><tspan x="1224" dy="0">The identity draws on the dual meaning</tspan><tspan x="1224" dy="38">of ALMa: </tspan><tspan font-style="italic" fill="#0E6F6D">alma mater</tspan><tspan> and the acronym</tspan><tspan x="1224" dy="38" font-style="italic" fill="#0E6F6D">Another Library Manager.</tspan></text>
