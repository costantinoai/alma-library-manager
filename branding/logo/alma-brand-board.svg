<text x="1012" y="1061" class="label" font-size="14">BOOKMARK</text><text x="1114" y="1061" class="label" font-size="14">PAPER</text><text x="1226" y="1061" class="label" font-size="14">LIBRARY</text><text x="1348" y="1061" class="label" font-size="14">DISCOVER</text>
<text x="1010" y="1172" font-family="Georgia,serif" font-style="italic" font-size="29" fill="#0F1E36">“Libraries store the energy</text><text x="1038" y="1210" font-family="Georgia,serif" font-style="italic" font-size="29" fill="#0F1E36">that fuels the imagination.”</text><text x="1120" y="1252" class="caps" letter-spacing="3" font-size="22">— NANCY PEARL</text>
