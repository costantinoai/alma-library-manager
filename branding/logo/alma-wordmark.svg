<rect width="1200" height="500" fill="#fff"/>
<text x="600" y="245" text-anchor="middle" class="wm" font-size="170">ALMa</text>
<path d="M255 310 H512 M688 310 H945" class="goldThin"/><circle cx="600" cy="310" r="11" fill="#C49A45"/>
