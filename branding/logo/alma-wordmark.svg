<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
<title id="title">ALMa wordmark</title>
<desc id="desc">ALMa wordmark.</desc>
<defs>
  <linearGradient id="navyGrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#17345B"/><stop offset="1" stop-color="#0F1E36"/></linearGradient>
  <linearGradient id="tealGrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#159892"/><stop offset="1" stop-color="#0E6F6D"/></linearGradient>
  <linearGradient id="paleGrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#DCEFF8"/><stop offset="1" stop-color="#B7D2E4"/></linearGradient>
  <linearGradient id="parchGrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#FFF1D2"/><stop offset="1" stop-color="#F3EAD6"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#09162A" flood-opacity=".16"/></filter>
  <style><![CDATA[
    .outline{stroke:#09162A;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#09162A;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}
