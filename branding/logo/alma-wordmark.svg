    .goldThin{stroke:#C49A45;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}
    .wm{font-family:Merriweather,Georgia,'Times New Roman',serif;font-weight:600;fill:#0F1E36}
    .caps{font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;font-weight:700;letter-spacing:14px;fill:#0E6F6D}
    .ui{font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#0F1E36}
    .label{font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;font-weight:800;letter-spacing:6px;fill:#0F1E36}
