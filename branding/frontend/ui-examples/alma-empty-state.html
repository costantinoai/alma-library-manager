<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALMa empty state example</title>
  <link rel="stylesheet" href="../tokens.css" />
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--color-bg); font-family:var(--font-ui); color:var(--color-text); }
    .empty { text-align:center; max-width:520px; background:#fff; border:1px solid var(--color-border); border-radius:24px; padding:48px; box-shadow:var(--shadow-md); }
    .empty img { width:86px; height:86px; margin-bottom:22px; }
    h1 { margin:0 0 10px; font:600 30px/1.2 var(--font-brand); color:var(--alma-navy); }
    p { margin:0 0 24px; color:var(--color-muted); line-height:1.55; }
    button { border:0; border-radius:14px; background:var(--alma-teal); color:white; padding:12px 18px; font-weight:700; }
  </style>
</head>
<body>
  <section class="empty">
    <img src="../../branding/logo/alma-app-icon.svg" alt="" />
    <h1>Start building your library</h1>
    <p>Import papers, add collections, or discover new research to organize in ALMa.</p>
    <button>Add your first paper</button>
  </section>
</body>
</html>
