# Build and publish ALMa Docker images to GitHub Container Registry.
#
# Triggers:
#   - push to main           publishes :latest, :latest-gpu, :latest-lite
#   - push of a v* git tag   publishes :X.Y.Z and friends for every flavor
#   - manual dispatch        ad-hoc rebuild of latest from current main
#
# Three image flavors are produced from a single Dockerfile:
#   - normal (CPU torch, default)  no suffix; this is what `:latest` pulls.
#   - normal (CUDA torch)          `-gpu` suffix; ~1.8 GB larger but
#                                  accelerates SPECTER2 inference when
#                                  the host has an NVIDIA GPU + the
#                                  NVIDIA Container Toolkit.
#   - lite                         `-lite` suffix; no torch / transformers
#                                  / adapters; use on Raspberry Pi or
#                                  other low-memory hosts.
#
# The CPU+normal default keeps `:latest` small for the common case
# (no host GPU). GPU users explicitly opt in via `:latest-gpu` /
# `:X.Y.Z-gpu`, or via `setup.sh` which autodetects.
#
# Multi-arch: amd64+arm64 for the CPU/lite flavors; the GPU flavor is
# amd64-only (Jetson-style ARM CUDA is out of scope for this repo).
#
# Auth uses the built-in GITHUB_TOKEN with packages:write. After the
# first successful publish, flip the GHCR package to public in the
# package settings page (one-time, manual).

name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: costantinoai/alma-library-manager

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: normal
            torch: cpu
            suffix: ""
            platforms: linux/amd64,linux/arm64
          - variant: normal
            torch: cuda
            suffix: "-gpu"
            platforms: linux/amd64
          - variant: lite
            torch: cpu
            suffix: "-lite"
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute Docker tags from the git ref. The `flavor.suffix` adds
      # `-lite` to every tag for the lite variant; `onlatest: true` makes
      # sure `:latest-lite` exists alongside `:latest`.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          build-args: |
            VARIANT=${{ matrix.variant }}
            TORCH_VARIANT=${{ matrix.torch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.torch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.torch }}
