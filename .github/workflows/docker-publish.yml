# Build and publish ALMa Docker images to GitHub Container Registry.
#
# Triggers:
#   - push to main           → publishes :latest (and :latest-lite)
#   - push of a v* git tag   → publishes :X.Y.Z, :X.Y, :X (and -lite variants)
#   - manual dispatch        → ad-hoc rebuild of latest from current main
#
# Two image variants are produced from a single Dockerfile via the VARIANT
# build-arg: `normal` (full AI stack) and `lite` (no torch/transformers).
# The lite variant carries a `-lite` suffix on every tag.
#
# Multi-arch: linux/amd64 + linux/arm64 (QEMU emulation for arm64).
#
# Auth uses the built-in GITHUB_TOKEN with packages:write — no extra secrets.
# After the first successful publish, flip the GHCR package to public in the
# package settings page (one-time, manual).

name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: costantinoai/alma-library-manager

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        variant: [normal, lite]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute Docker tags from the git ref. The `flavor.suffix` adds
      # `-lite` to every tag for the lite variant; `onlatest: true` makes
      # sure `:latest-lite` exists alongside `:latest`.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.variant == 'lite' && '-lite' || '' }},onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VARIANT=${{ matrix.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
