site_name: ALMa
site_description: Personal academic literature monitor and discovery engine.
site_url: https://costantinoai.github.io/alma-library-manager/
repo_url: https://github.com/costantinoai/alma-library-manager
repo_name: costantinoai/alma-library-manager
edit_uri: edit/main/docs/
copyright: >
  Copyright &copy; Andrea Ivan Costantino — Released under
  <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>.

docs_dir: docs

exclude_docs: |
  _internal/
  api_samples/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/costantinoai/alma-library-manager
      name: ALMa on GitHub

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - swagger-ui-tag

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Vision & philosophy: vision.md
  - Getting started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - First run: getting-started/first-run.md
      - Docker: getting-started/docker.md
  - Concepts:
      - concepts/index.md
      - Paper lifecycle: concepts/paper-lifecycle.md
      - Feed: concepts/feed.md
      - Library: concepts/library.md
      - Discovery: concepts/discovery.md
      - Lenses: concepts/lenses.md
      - Authors: concepts/authors.md
      - Insights: concepts/insights.md
      - Alerts: concepts/alerts.md
      - AI capabilities: concepts/ai.md
  - User guide:
      - user-guide/index.md
      - Saving papers: user-guide/saving-papers.md
      - Reading workflow: user-guide/reading-workflow.md
      - Importing from Zotero / BibTeX: user-guide/importing.md
      - Tracking authors: user-guide/tracking-authors.md
      - Tuning Discovery: user-guide/tuning-discovery.md
      - Configuring AI providers: user-guide/configuring-ai.md
      - Setting up alerts: user-guide/setting-up-alerts.md
  - Reference:
      - reference/index.md
      - REST API: reference/api.md
      - Configuration: reference/configuration.md
      - Database schema: reference/database.md
      - External APIs: reference/external-apis.md
      - Scoring formulas: reference/scoring.md
  - Operations:
      - operations/index.md
      - Backups: operations/backups.md
      - Background jobs: operations/background-jobs.md
      - Performance: operations/performance.md
      - Deployment: operations/deployment.md
  - Development:
      - development/index.md
      - Architecture: development/architecture.md
      - Frontend: development/frontend.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
